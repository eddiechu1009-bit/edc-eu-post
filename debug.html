<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug Grid</title></head>
<body style="background:#f5f5f5;padding:20px;font-family:sans-serif;">
<h2>Grid Debug - checking card HTML for broken tags</h2>
<div id="result" style="white-space:pre-wrap;font-size:13px;"></div>
<script>
const data = /*__LOAD_FROM_JSON__*/null;

async function run() {
  const resp = await fetch('articles.json');
  const raw = await resp.json();
  
  // Simulate deduplicateAndMerge
  const daily = raw.filter(a => a.type === 'daily');
  const weekly = raw.filter(a => a.type === 'weekly');
  daily.forEach(a => { a.featured = false; });
  
  weekly.forEach(w => {
    const cleanTitle = w.title.replace(/【週報\s*W\d+】/, '').trim();
    const match = daily.find(d => {
      const wordsA = new Set(d.title.replace(/[^\w\u4e00-\u9fff]/g, ' ').split(/\s+/).filter(w => w.length > 1));
      const wordsB = new Set(cleanTitle.replace(/[^\w\u4e00-\u9fff]/g, ' ').split(/\s+/).filter(w => w.length > 1));
      if (wordsA.size === 0 || wordsB.size === 0) return false;
      let overlap = 0;
      wordsA.forEach(w => { if (wordsB.has(w)) overlap++; });
      return (overlap / Math.min(wordsA.size, wordsB.size)) >= 0.35;
    });
    if (match) {
      match.featured = true;
    } else {
      w.featured = true;
      w.title = w.title.replace(/【週報\s*W\d+】/, '★ ');
      daily.push(w);
    }
  });
  
  daily.sort((a, b) => {
    if (b.date !== a.date) return b.date.localeCompare(a.date);
    if (a.featured !== b.featured) return a.featured ? -1 : 1;
    return 0;
  });

  const articles = daily;
  const out = document.getElementById('result');
  
  // Filter for 稅務
  const taxArticles = articles.filter(a => a.tags.includes('稅務'));
  out.textContent += `\n=== 稅務 tab: ${taxArticles.length} articles ===\n`;
  
  // Generate card HTML for first 10 and check for broken structure
  const first10 = taxArticles.slice(0, 10);
  first10.forEach((a, i) => {
    const cardHtml = `<div class="article-card">
      <div class="card-color-bar" style="background:${a.color}"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-date">${a.date}</span>
          <span class="card-type">日報</span>
          <div class="card-tags">
            ${a.tags.map(t => `<span class="card-tag tag-${t}">${t}</span>`).join('')}
          </div>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-excerpt">${a.summary}</div>
      </div>
      <div class="card-footer">
        <span>CONTINUE READING →</span>
      </div>
    </div>`;
    
    // Parse and check
    const temp = document.createElement('div');
    temp.innerHTML = cardHtml;
    const cards = temp.querySelectorAll('.article-card');
    const divCount = (cardHtml.match(/<div/g) || []).length;
    const divCloseCount = (cardHtml.match(/<\/div>/g) || []).length;
    
    if (cards.length !== 1 || divCount !== divCloseCount) {
      out.textContent += `❌ Card ${i}: ${a.date} "${a.title.slice(0,40)}..." - cards=${cards.length} divOpen=${divCount} divClose=${divCloseCount}\n`;
      // Check summary for HTML
      if (/<\/?div/.test(a.summary)) out.textContent += `   PROBLEM: summary contains div tags!\n`;
      if (/<\/?span/.test(a.summary)) out.textContent += `   PROBLEM: summary contains span tags!\n`;
      out.textContent += `   Summary first 100: ${a.summary.slice(0,100)}\n`;
    } else {
      out.textContent += `✅ Card ${i}: ${a.date} "${a.title.slice(0,40)}..." OK\n`;
    }
  });
  
  // Now actually render into a grid and check
  out.textContent += `\n=== Rendering test grid ===\n`;
  const testGrid = document.createElement('div');
  testGrid.style.cssText = 'display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:900px;margin:20px 0;';
  
  first10.forEach((a, i) => {
    const card = document.createElement('div');
    card.style.cssText = 'background:#fff;padding:16px;border:1px solid #ddd;border-radius:8px;';
    card.innerHTML = `<strong>${i}: ${a.date}</strong><br>${a.title.slice(0,50)}...<br><small>${a.summary.slice(0,80)}...</small>`;
    testGrid.appendChild(card);
  });
  
  document.body.appendChild(testGrid);
  out.textContent += `Grid children: ${testGrid.children.length}\n`;
  out.textContent += `Grid computed columns: ${getComputedStyle(testGrid).gridTemplateColumns}\n`;
}

run();
</script>
</body>
</html>
